<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#4F46E5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <title>加入活動 · Quizly</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    :root { --safe-bottom: env(safe-area-inset-bottom, 0); --safe-top: env(safe-area-inset-top, 0); }
    body { background: var(--bg); overscroll-behavior: none; }
    .m-shell { max-width: 520px; margin: 0 auto; min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; padding: calc(var(--safe-top) + 12px) 14px calc(var(--safe-bottom) + 14px); gap: 12px; }
    .m-hero {
      background: var(--gradient-tech); color: white;
      border-radius: 22px; padding: 22px 22px 26px;
      box-shadow: 0 20px 40px -20px rgba(79,70,229,.55);
      position: relative; overflow: hidden;
    }
    .m-hero::after {
      content: ''; position: absolute; right: -40px; top: -40px; width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(255,255,255,.18), transparent 60%);
    }
    .m-hero .row { gap: 10px; opacity: .92; margin-bottom: 10px; position: relative; z-index: 1; }
    .m-hero h1 { font-size: 26px; letter-spacing: -.02em; margin: 4px 0 6px; position: relative; z-index: 1; }
    .m-hero p  { font-size: 14px; opacity: .85; margin: 0; position: relative; z-index: 1; line-height: 1.5; }
    .m-logo { width: 32px; height: 32px; background: rgba(255,255,255,.18); border-radius: 9px; display: grid; place-items: center; }
    .m-logo svg { width: 22px; height: 22px; }
    .code-badge { font-family: 'SF Mono', Consolas, monospace; font-size: 12px; padding: 4px 10px; border-radius: 999px; background: rgba(255,255,255,.2); letter-spacing: .15em; }

    .ans-stack { display: flex; flex-direction: column; gap: 10px; }
    .ans-btn {
      width: 100%; padding: 18px 18px; border-radius: 16px;
      background: var(--surface); border: 2px solid var(--border);
      font-size: 17px; font-weight: 600; text-align: left;
      display: flex; align-items: center; gap: 14px;
      font-family: inherit; color: var(--text); cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: transform .15s cubic-bezier(.3,1.5,.5,1), border-color .15s, background .15s;
      min-height: 64px;
      -webkit-tap-highlight-color: transparent;
    }
    .ans-btn:active { transform: scale(.97); }
    .ans-btn .l {
      width: 40px; height: 40px; border-radius: 12px;
      background: var(--gradient-soft); color: var(--primary);
      display: grid; place-items: center; font-weight: 800; font-size: 18px;
      flex-shrink: 0;
    }
    .ans-btn.selected { border-color: var(--primary); background: var(--primary-50); transform: scale(.99); }
    .ans-btn.selected .l { background: var(--gradient-tech); color: white; }
    .ans-btn.correct  { border-color: var(--success); background: var(--success-50); }
    .ans-btn.correct .l { background: var(--success); color: white; }
    .ans-btn.incorrect{ border-color: var(--danger);  background: var(--danger-50); }
    .ans-btn.incorrect .l { background: var(--danger); color: white; }
    .ans-btn:disabled { opacity: .55; cursor: not-allowed; }

    .q-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 18px;
      padding: 18px; box-shadow: var(--shadow-sm);
    }
    .q-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
    .q-text { font-size: 19px; line-height: 1.4; margin: 14px 0 4px; font-weight: 600; }
    .tbar { height: 6px; background: var(--bg-soft); border-radius: 999px; overflow: hidden; margin-top: 6px; }
    .tbar > div { height: 100%; background: var(--gradient-tech); transition: width .3s linear; will-change: width; }

    .result-card { text-align: center; padding: 32px 22px; }
    .result-icon { font-size: 64px; line-height: 1; margin-bottom: 4px; }
    .badge-row { display: flex; gap: 12px; margin-top: 18px; }
    .badge-row > div { flex: 1; background: var(--surface-2); border-radius: 14px; padding: 12px 8px; }
    .badge-row .lbl { font-size: 11px; color: var(--text-mute); letter-spacing: .05em; text-transform: uppercase; }
    .badge-row .val { font-size: 26px; font-weight: 800; color: var(--primary); font-variant-numeric: tabular-nums; margin-top: 2px; }

    .wait-card { text-align: center; padding: 28px 22px; }
    .wait-pulse {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--gradient-tech); margin: 12px auto 14px; position: relative;
      animation: pulse 1.6s ease-in-out infinite;
    }
    .wait-pulse::after {
      content: ''; position: absolute; inset: -6px; border-radius: 50%;
      border: 2px solid var(--primary); opacity: .4;
      animation: pulse-ring 1.6s ease-out infinite;
    }
    @keyframes pulse      { 0%,100% { transform: scale(1); } 50% { transform: scale(.92); } }
    @keyframes pulse-ring { 0% { transform: scale(.7); opacity: .55; } 100% { transform: scale(1.6); opacity: 0; } }

    .submit { padding: 16px; font-size: 17px; border-radius: 14px; }
    .field-m { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
    .field-m label { font-size: 13px; color: var(--text-soft); font-weight: 500; }
    .field-m .input { padding: 14px 14px; font-size: 16px; border-radius: 12px; }
  </style>
</head>
<body>
  <div class="m-shell">

    <!-- Top hero -->
    <div class="m-hero">
      <div class="row">
        <div class="m-logo">
          <svg viewBox="0 0 64 64" fill="none">
            <circle cx="28" cy="32" r="13" stroke="white" stroke-width="4" fill="none"/>
            <path d="M37 41 L46 50" stroke="white" stroke-width="4" stroke-linecap="round"/>
            <circle cx="46" cy="50" r="3.5" fill="white"/>
            <path d="M48 14 L50 18 L54 20 L50 22 L48 26 L46 22 L42 20 L46 18 Z" fill="white" fill-opacity=".85"/>
          </svg>
        </div>
        <span style="font-size: 13px; letter-spacing: .14em; font-weight: 600;">QUIZLY</span>
        <span class="spacer"></span>
        <span class="code-badge" id="code-pill">—</span>
      </div>
      <h1 id="activity-title">準備加入活動…</h1>
      <p id="hero-sub">輸入您的員工編號與暱稱即可加入。遊戲中只會顯示暱稱。</p>
    </div>

    <!-- Join form -->
    <div id="view-join" class="card" style="border-radius: 18px;">
      <div class="field-m">
        <label>員工編號</label>
        <input class="input" id="emp" required autocomplete="off" inputmode="numeric" />
      </div>
      <div class="field-m">
        <label>暱稱（給其他人看的）</label>
        <input class="input" id="nick" required autocomplete="off" maxlength="20" placeholder="例如：CoffeeFan" />
      </div>
      <div class="field-m">
        <label>單位（選填）</label>
        <input class="input" id="dept" autocomplete="off" placeholder="例如：海外事業部" />
      </div>
      <button class="btn btn-primary btn-block submit" id="join-btn">加入活動 →</button>
      <div id="join-err" style="margin-top: 10px; color: var(--danger); font-size: 13px; text-align: center;"></div>
    </div>

    <!-- Waiting room -->
    <div id="view-wait" class="card wait-card hidden" style="border-radius: 18px;">
      <div class="wait-pulse"></div>
      <span class="pill pill-cyan">已加入</span>
      <h2 style="margin: 12px 0 4px;" id="wait-name">—</h2>
      <p class="text-soft" style="margin: 0;">等待主持人開始第一題…</p>
    </div>

    <!-- Question -->
    <div id="view-question" class="hidden">
      <div class="q-card">
        <div class="q-meta">
          <span class="pill pill-cyan" id="p-day"></span>
          <span class="pill" id="p-set"></span>
          <span class="pill pill-soft mono" id="p-no"></span>
          <span class="spacer"></span>
          <span class="pill pill-amber mono" id="p-time">—</span>
        </div>
        <div class="tbar"><div id="time-fill" style="width: 100%"></div></div>
        <h2 id="p-text" class="q-text"></h2>
      </div>
      <div id="answers" class="ans-stack" style="margin-top: 10px;"></div>
      <div id="p-msg" class="card hidden" style="margin-top: 10px; text-align: center; border-radius: 14px;"></div>
    </div>

    <!-- Result feedback -->
    <div id="view-result" class="card result-card hidden" style="border-radius: 18px;">
      <div class="result-icon" id="result-icon"></div>
      <h2 id="result-title" style="margin: 0;"></h2>
      <p class="text-soft" id="result-sub" style="margin: 6px 0 0;"></p>
      <div class="badge-row">
        <div>
          <div class="lbl">本題得分</div>
          <div class="val" id="result-score">0</div>
        </div>
        <div>
          <div class="lbl">用時</div>
          <div class="val mono" id="result-time">0.0s</div>
        </div>
      </div>
    </div>

    <!-- Leaderboard (mobile) -->
    <div id="view-lb" class="card hidden" style="border-radius: 18px;">
      <h2 style="margin: 0 0 12px;" id="lb-title">即時排行榜</h2>
      <div id="lb-list"></div>
    </div>

    <!-- Ended -->
    <div id="view-end" class="card hidden" style="text-align: center; padding: 36px 24px; border-radius: 18px;">
      <div style="font-size: 56px;">🏁</div>
      <h2>活動結束</h2>
      <p class="text-soft">感謝參與，請聽主持人公布獎項！</p>
    </div>

  </div>

<script src="/socket.io/socket.io.js"></script>
<script>
const $ = s => document.querySelector(s);
const url = new URL(location.href);
const sessionId = (url.searchParams.get('s') || '').toUpperCase();
let socket, playerId, currentQ = null, hasAnswered = false, qStartedAt = null, qTimer;

$('#code-pill').textContent = sessionId || '—';
if (!sessionId) {
  $('#activity-title').textContent = '請從主持人 QR Code 進入';
  $('#hero-sub').textContent = '網址需要帶上現場代碼，例如 /join.html?s=A3K9PX';
  $('#join-btn').disabled = true;
  document.querySelectorAll('#view-join input').forEach(i => i.disabled = true);
} else {
  fetch('/api/sessions/' + sessionId).then(r => r.json()).then(s => {
    if (s.activity_name) $('#activity-title').textContent = s.activity_name;
    else $('#activity-title').textContent = '加入活動';
  }).catch(() => { $('#activity-title').textContent = '找不到此現場代碼'; });
}

$('#join-btn').addEventListener('click', joinSession);
['emp','nick','dept'].forEach(id => {
  $('#'+id).addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); joinSession(); } });
});

async function joinSession() {
  $('#join-err').textContent = '';
  const body = {
    employee_id: $('#emp').value.trim(),
    nickname:    $('#nick').value.trim(),
    department:  $('#dept').value.trim(),
  };
  if (!body.employee_id || !body.nickname) { $('#join-err').textContent = '請填員工編號與暱稱'; return; }
  $('#join-btn').disabled = true;
  $('#join-btn').textContent = '加入中…';
  try {
    const r = await fetch(`/api/sessions/${sessionId}/join`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const j = await r.json();
    if (!r.ok) throw new Error(j.error || '加入失敗');
    playerId = j.player_id;
    $('#wait-name').textContent = j.nickname;
    $('#hero-sub').textContent = `歡迎，${j.nickname}！`;
    showView('wait');
    connectSocket();
  } catch (err) {
    $('#join-err').textContent = err.message;
    $('#join-btn').disabled = false;
    $('#join-btn').textContent = '加入活動 →';
  }
}

function showView(name) {
  for (const v of ['join','wait','question','result','lb','end']) {
    const el = $('#view-' + v);
    if (el) el.classList.toggle('hidden', v !== name);
  }
}

function connectSocket() {
  socket = io({ transports: ['websocket', 'polling'] });
  socket.on('connect', () => socket.emit('player_join', { session_id: sessionId, player_id: playerId }));

  socket.on('question_started', ({ question, started_at }) => {
    currentQ = question;
    qStartedAt = started_at;
    hasAnswered = false;
    renderQuestion(question);
    showView('question');
    startQTimer(question.time_limit_sec, started_at);
    $('#p-msg').classList.add('hidden');
  });

  socket.on('answer_accepted', ({ question_id, is_correct, score, elapsed_ms }) => {
    if (!currentQ || currentQ.question_id !== question_id) return;
    showView('result');
    if (is_correct) {
      $('#result-icon').textContent = '✓';
      $('#result-icon').style.color = 'var(--success)';
      $('#result-title').textContent = '答對了！';
      $('#result-sub').textContent = '主持人公布答案後會看到全場分布。';
    } else {
      $('#result-icon').textContent = '✗';
      $('#result-icon').style.color = 'var(--danger)';
      $('#result-title').textContent = '答錯了';
      $('#result-sub').textContent = '繼續加油，下一題再來。';
    }
    $('#result-score').textContent = score;
    $('#result-time').textContent = (elapsed_ms/1000).toFixed(1) + 's';
    if (navigator.vibrate) navigator.vibrate(is_correct ? [10, 30, 10] : 60);
  });

  socket.on('answer_rejected', ({ reason }) => {
    const msg = $('#p-msg');
    msg.classList.remove('hidden');
    msg.innerHTML = reason === 'too_late' ? '<span class="text-danger">已超過作答時間</span>' :
                    reason === 'already_answered' ? '已作答，請等待結果' : '無法作答';
  });

  socket.on('answer_revealed', ({ question_id, correct }) => {
    if (!currentQ || currentQ.question_id !== question_id) return;
    document.querySelectorAll('.ans-btn').forEach(b => {
      if (b.dataset.letter === correct) b.classList.add('correct');
      else if (b.classList.contains('selected')) b.classList.add('incorrect');
      b.disabled = true;
    });
  });

  socket.on('explanation_shown', ({ explanation }) => {
    const msg = $('#p-msg');
    msg.classList.remove('hidden');
    msg.innerHTML = `<div class="text-soft" style="font-size:12px;">主持人正在解說</div><div style="margin-top:6px;">${escapeHtml(explanation||'')}</div>`;
  });

  socket.on('leaderboard', ({ scope, day_label, rows }) => {
    showView('lb');
    $('#lb-title').textContent = scope === 'day' ? `${day_label} 排名` : '即時排行榜';
    const el = $('#lb-list');
    if (!rows.length) { el.innerHTML = '<div class="muted-card">尚無成績</div>'; return; }
    el.innerHTML = '';
    rows.slice(0, 10).forEach((r, i) => {
      const cls = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
      const isMe = r.player_id === playerId;
      const row = document.createElement('div');
      row.className = 'lb-row ' + cls;
      row.style.gridTemplateColumns = '44px 1fr 78px';
      row.innerHTML = `
        <div class="lb-rank mono">${i+1}</div>
        <div>
          <div class="lb-name">${escapeHtml(r.nickname)}${isMe ? '<span class="pill pill-cyan" style="margin-left:6px;">你</span>' : ''}</div>
          <div class="lb-meta">答對 ${r.correct} 題</div>
        </div>
        <div class="lb-score mono">${r.score}</div>`;
      el.appendChild(row);
    });
  });

  socket.on('game_ended', () => showView('end'));
}

function renderQuestion(q) {
  $('#p-day').textContent = q.day_label || '';
  $('#p-set').textContent = q.set_name || '';
  $('#p-no').textContent  = '第 ' + (q.question_no ?? '?') + ' 題';
  $('#p-text').textContent = q.question_text;
  const wrap = $('#answers'); wrap.innerHTML = '';
  for (const [letter, text] of Object.entries(q.options)) {
    if (!text) continue;
    const b = document.createElement('button');
    b.className = 'ans-btn';
    b.dataset.letter = letter;
    b.innerHTML = `<div class="l">${letter}</div><div>${escapeHtml(text)}</div>`;
    b.onclick = () => sendAnswer(letter, b);
    wrap.appendChild(b);
  }
}

function sendAnswer(letter, btn) {
  if (hasAnswered) return;
  hasAnswered = true;
  document.querySelectorAll('.ans-btn').forEach(b => { b.disabled = true; });
  btn.classList.add('selected');
  if (navigator.vibrate) navigator.vibrate(15);
  socket.emit('player_answer', { question_id: currentQ.question_id, selected: letter });
}

function startQTimer(seconds, startedAt) {
  if (qTimer) clearInterval(qTimer);
  const update = () => {
    const elapsed = (Date.now() - startedAt) / 1000;
    const left = Math.max(0, seconds - elapsed);
    $('#p-time').textContent = left.toFixed(1) + 's';
    $('#time-fill').style.width = ((left / seconds) * 100).toFixed(2) + '%';
    if (left <= 0) {
      clearInterval(qTimer);
      document.querySelectorAll('.ans-btn').forEach(b => b.disabled = true);
    }
  };
  update();
  qTimer = setInterval(update, 100);
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
</script>
</body>
</html>
