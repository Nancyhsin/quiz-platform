<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>主持人投影 · Quizly</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    body { background: var(--bg); }
    .pickbox { max-width: 560px; margin: 80px auto; }
  </style>
</head>
<body>

  <!-- Picker shown when no session in URL -->
  <div id="picker" class="hidden">
    <div class="pickbox card">
      <h2 class="card-title">輸入現場代碼</h2>
      <p class="card-sub">請從後台「建立現場代碼」取得，或直接帶入 ?s= 參數。</p>
      <div class="row">
        <input class="input" id="code-input" placeholder="例如：A3K9PX" style="letter-spacing: .2em; text-transform: uppercase; font-size: 22px; text-align: center;" />
        <button class="btn btn-primary" id="code-go">前往</button>
      </div>
      <div class="divider"></div>
      <a class="btn btn-ghost btn-block" href="/admin.html">先去後台建立活動</a>
    </div>
  </div>

  <!-- Main host stage -->
  <div id="stage" class="stage hidden">
    <header class="stage-header">
      <div class="brand">
        <div class="brand-mark">
          <svg viewBox="0 0 64 64" fill="none">
            <circle cx="28" cy="32" r="13" stroke="white" stroke-width="4" fill="none"/>
            <path d="M37 41 L46 50" stroke="white" stroke-width="4" stroke-linecap="round"/>
            <circle cx="46" cy="50" r="3.5" fill="white"/>
            <path d="M48 14 L50 18 L54 20 L50 22 L48 26 L46 22 L42 20 L46 18 Z" fill="white" fill-opacity=".85"/>
          </svg>
        </div>
        <div>
          <div id="activity-name">活動載入中…</div>
          <div class="brand-tag">Host · 現場代碼 <span id="code-tag" class="mono">—</span></div>
        </div>
      </div>
      <div class="row">
        <span class="pill pill-cyan" id="phase-pill">準備中</span>
        <span class="pill pill-soft mono"><span id="player-count">0</span> 人已加入</span>
        <div id="timer" class="timer-ring hidden">0</div>
      </div>
    </header>

    <main class="stage-body" id="body">
      <!-- Lobby view (default) -->
      <section id="view-lobby">
        <div class="qr-stage">
          <div>
            <div class="pill pill-cyan">參賽者掃描 QR Code 加入</div>
            <h2 style="font-size: 40px; margin: 14px 0; letter-spacing: -.02em;">用手機掃描 QR Code<br/>或前往：</h2>
            <div class="qr-help mono" id="join-url">—</div>
            <div style="margin-top: 18px;">
              <span class="text-soft" style="font-size: 14px;">現場代碼</span>
              <div class="qr-code-pill" id="big-code">—</div>
            </div>
          </div>
          <img id="qr-img" class="qr-img" alt="QR Code" />
        </div>

        <div class="card" style="margin-top: 24px;">
          <div class="row-between" style="margin-bottom: 12px;">
            <h3 style="margin: 0;">已加入參賽者</h3>
            <span class="pill pill-soft mono"><span id="lobby-count">0</span> 人</span>
          </div>
          <div id="players-list" class="players-grid"></div>
        </div>
      </section>

      <!-- Question view -->
      <section id="view-question" class="hidden">
        <div class="qheader">
          <div>
            <div class="qmeta">
              <span class="pill pill-cyan" id="q-day"></span>
              <span class="pill" id="q-set"></span>
              <span class="pill pill-soft mono" id="q-no"></span>
            </div>
            <div class="qtext" id="q-text"></div>
          </div>
        </div>
        <div class="options-grid" id="options-grid"></div>
        <div class="row" style="margin-top: 16px;">
          <span class="pill pill-soft mono"><span id="answered-count">0</span> / <span id="answered-total">0</span> 已作答</span>
        </div>
      </section>

      <!-- Explain view -->
      <section id="view-explain" class="hidden">
        <div class="card">
          <h2 class="card-title">詳解</h2>
          <p class="card-sub" id="explain-question"></p>
          <p style="font-size: 24px; line-height: 1.55;" id="explain-text"></p>
        </div>
      </section>

      <!-- Leaderboard view -->
      <section id="view-leaderboard" class="hidden">
        <div class="row-between" style="margin-bottom: 16px;">
          <h2 style="margin: 0; font-size: 32px; letter-spacing: -.02em;" id="lb-title">即時排行榜</h2>
          <div class="tabs">
            <div class="tab active" data-scope="total">總排名</div>
            <div class="tab" data-scope="Day 1">Day 1</div>
            <div class="tab" data-scope="Day 2">Day 2</div>
            <div class="tab" data-scope="Day 3">Day 3</div>
          </div>
        </div>
        <div id="lb-rows"></div>
      </section>

      <!-- Ended view -->
      <section id="view-ended" class="hidden">
        <div class="card" style="text-align: center; padding: 64px 32px;">
          <h2 style="font-size: 40px; letter-spacing: -.02em;">活動結束</h2>
          <p class="text-soft" style="font-size: 18px;">感謝各位參賽者！可前往後台下載完整 Excel 成績。</p>
          <a class="btn btn-primary btn-lg" id="download-final" target="_blank">下載 Excel 完整成績</a>
        </div>
      </section>
    </main>

    <footer class="stage-footer">
      <button class="btn btn-primary" id="btn-next">▶ 下一題 / 開始</button>
      <button class="btn" id="btn-reveal">公布答案</button>
      <button class="btn" id="btn-explain">顯示詳解</button>
      <button class="btn" id="btn-leaderboard">即時排名</button>
      <span class="spacer"></span>
      <button class="btn btn-ghost" id="btn-lobby">回到 QR 等待室</button>
    </footer>
  </div>

<script src="/socket.io/socket.io.js"></script>
<script>
const $ = sel => document.querySelector(sel);
const url = new URL(location.href);
let sessionId = (url.searchParams.get('s') || '').toUpperCase();
let socket = null;
let currentQ = null;
let timerInterval = null;

if (!sessionId) {
  $('#picker').classList.remove('hidden');
  $('#code-go').onclick = () => {
    const v = $('#code-input').value.trim().toUpperCase();
    if (v) location.href = '/host.html?s=' + v;
  };
  $('#code-input').addEventListener('keydown', e => { if (e.key === 'Enter') $('#code-go').click(); });
} else {
  boot();
}

async function boot() {
  $('#stage').classList.remove('hidden');
  $('#code-tag').textContent = sessionId;
  $('#big-code').textContent = sessionId;
  // Ask the server what URL it tells players to use (handles PUBLIC_URL / LAN-IP fallback)
  let joinUrl = `${location.origin}/join.html?s=${sessionId}`;
  try {
    const j = await fetch(`/api/sessions/${sessionId}/join-url`).then(r => r.json());
    if (j.join_url) joinUrl = j.join_url;
  } catch (e) {}
  $('#join-url').textContent = joinUrl;
  $('#qr-img').src = `/api/sessions/${sessionId}/qrcode`;
  $('#download-final').href = `/api/sessions/${sessionId}/export.xlsx`;

  try {
    const s = await fetch('/api/sessions/' + sessionId).then(r => r.json());
    if (s.activity_name) $('#activity-name').textContent = s.activity_name;
  } catch (e) {}

  // initial player list
  const players = await fetch(`/api/sessions/${sessionId}/players`).then(r => r.json());
  setPlayerCount(players.length);
  for (const p of players) addPlayerChip(p);

  socket = io({ transports: ['websocket', 'polling'] });
  socket.on('connect', () => { socket.emit('host_join', { session_id: sessionId }); });

  socket.on('player_joined', p => {
    addPlayerChip(p);
    setPlayerCount(document.querySelectorAll('.player-chip').length);
  });

  socket.on('question_started', ({ question, started_at }) => {
    currentQ = question;
    showView('question');
    setPhase('題目進行中', 'pill-cyan');
    renderQuestion(question);
    startTimer(question.time_limit_sec, started_at);
  });

  socket.on('answer_progress', ({ question_id, answered, total }) => {
    if (currentQ && currentQ.question_id === question_id) {
      $('#answered-count').textContent = answered;
      $('#answered-total').textContent = total;
    }
  });

  socket.on('answer_revealed', ({ question_id, correct, distribution, total }) => {
    if (!currentQ || currentQ.question_id !== question_id) return;
    setPhase('已公布答案', 'pill-green');
    revealAnswer(correct, distribution, total);
    stopTimer();
  });

  socket.on('explanation_shown', ({ question_id, explanation }) => {
    setPhase('詳解中', '');
    showView('explain');
    if (currentQ) $('#explain-question').textContent = currentQ.question_text;
    $('#explain-text').textContent = explanation || '（此題未提供詳解）';
  });

  socket.on('leaderboard', ({ scope, day_label, rows }) => {
    setPhase('排行榜', 'pill-amber');
    showView('leaderboard');
    $('#lb-title').textContent = scope === 'day' ? `${day_label} 排名` : '總排名';
    renderLeaderboard(rows);
  });

  socket.on('game_ended', () => {
    setPhase('已結束', 'pill-soft');
    showView('ended');
  });

  bindControls();
}

function setPhase(label, cls) {
  const p = $('#phase-pill');
  p.className = 'pill ' + (cls || '');
  p.textContent = label;
}
function setPlayerCount(n) {
  $('#player-count').textContent = n;
  $('#lobby-count').textContent = n;
}

function addPlayerChip(p) {
  const el = document.createElement('div');
  el.className = 'player-chip';
  el.dataset.id = p.player_id;
  if (document.querySelector(`.player-chip[data-id="${p.player_id}"]`)) return;
  el.innerHTML = `<div class="player-avatar">${escapeHtml((p.nickname||'?')[0].toUpperCase())}</div><div>${escapeHtml(p.nickname)}${p.department ? `<div class="text-soft" style="font-size:11px;">${escapeHtml(p.department)}</div>` : ''}</div>`;
  $('#players-list').appendChild(el);
}

function showView(name) {
  for (const v of ['lobby','question','explain','leaderboard','ended']) {
    $('#view-' + v).classList.toggle('hidden', v !== name);
  }
}

function renderQuestion(q) {
  $('#q-day').textContent = q.day_label || '';
  $('#q-set').textContent = q.set_name || '';
  $('#q-no').textContent = '第 ' + (q.question_no ?? '?') + ' 題';
  $('#q-text').textContent = q.question_text;
  const grid = $('#options-grid');
  grid.innerHTML = '';
  for (const [letter, text] of Object.entries(q.options || { A: q.option_a, B: q.option_b, C: q.option_c, D: q.option_d })) {
    if (!text) continue;
    const tile = document.createElement('div');
    tile.className = 'option-tile';
    tile.dataset.letter = letter;
    tile.innerHTML = `<div class="letter">${letter}</div><div class="opt-text">${escapeHtml(text)}</div><div class="option-bar" style="width: 0"></div>`;
    grid.appendChild(tile);
  }
  $('#answered-count').textContent = '0';
  $('#answered-total').textContent = document.querySelectorAll('.player-chip').length;
}

function revealAnswer(correct, dist, total) {
  total = total || Object.values(dist || {}).reduce((s,v)=>s+v,0);
  document.querySelectorAll('.option-tile').forEach(t => {
    const letter = t.dataset.letter;
    const cnt = (dist && dist[letter]) || 0;
    const pct = total ? Math.round(cnt / total * 100) : 0;
    const bar = t.querySelector('.option-bar');
    if (bar) bar.style.width = pct + '%';
    if (letter === correct) t.classList.add('correct');
    else t.classList.add('wrong');
    let stat = t.querySelector('.opt-stat');
    if (!stat) {
      stat = document.createElement('div');
      stat.className = 'opt-stat';
      stat.style.marginLeft = 'auto';
      stat.style.fontWeight = '700';
      stat.style.color = 'var(--text-soft)';
      t.appendChild(stat);
    }
    stat.textContent = `${cnt} 人 · ${pct}%`;
  });
}

function renderLeaderboard(rows) {
  const el = $('#lb-rows');
  if (!rows.length) { el.innerHTML = '<div class="muted-card">尚無成績資料。</div>'; return; }
  el.innerHTML = '';
  rows.slice(0, 10).forEach((r, i) => {
    const rank = i + 1;
    const cls = rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? 'bronze' : '';
    const row = document.createElement('div');
    row.className = 'lb-row ' + cls;
    row.innerHTML = `
      <div class="lb-rank mono">${rank}</div>
      <div>
        <div class="lb-name">${escapeHtml(r.nickname)}</div>
        <div class="lb-meta">答對 ${r.correct} 題 · ${escapeHtml(r.department || '')}</div>
      </div>
      <div class="lb-score mono">${r.score}</div>`;
    el.appendChild(row);
  });
}

function startTimer(seconds, startedAt) {
  stopTimer();
  $('#timer').classList.remove('hidden');
  const update = () => {
    const elapsed = (Date.now() - startedAt) / 1000;
    const left = Math.max(0, seconds - elapsed);
    $('#timer').textContent = Math.ceil(left);
    if (left <= 0) stopTimer();
  };
  update();
  timerInterval = setInterval(update, 200);
}
function stopTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  setTimeout(() => $('#timer').classList.add('hidden'), 800);
}

function bindControls() {
  $('#btn-next').onclick    = () => socket.emit('host_next_question');
  $('#btn-reveal').onclick  = () => socket.emit('host_reveal');
  $('#btn-explain').onclick = () => socket.emit('host_explain');
  $('#btn-leaderboard').onclick = () => socket.emit('host_leaderboard', { scope: 'total' });
  $('#btn-lobby').onclick   = () => showView('lobby');
  document.querySelectorAll('.tab[data-scope]').forEach(t => {
    t.onclick = () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      const sc = t.dataset.scope;
      if (sc === 'total') socket.emit('host_leaderboard', { scope: 'total' });
      else socket.emit('host_lea
